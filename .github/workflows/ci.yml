name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Checks ──
  api-lint-test:
    name: API — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recall
          POSTGRES_PASSWORD: recall
          POSTGRES_DB: recall_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Test
        run: pytest --cov=app --cov-report=xml -q
        env:
          DATABASE_URL: postgresql+asyncpg://recall:recall@localhost:5432/recall_test
          APP_SECRET_KEY: test-secret
          APP_ENV: test

  # ── Frontend Checks ──
  web-lint-build:
    name: Web — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  # ── Docker Build ──
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [api-lint-test, web-lint-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t recall-api:latest ./apps/api

      - name: Build Web image
        run: docker build -t recall-web:latest ./apps/web
